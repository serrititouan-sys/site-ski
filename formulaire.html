<main class="content">
    <section class="section">
      <h2>Formulaire de contact</h2>
      <form action="formulaire.php" method="post" class="form-block">
        
        <!-- Champ texte -->
        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" required>
        <br><br>

        <!-- Champ email -->
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <!-- Champ mot de passe -->
        <label for="password">Mot de passe :</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <!-- Boutons radio -->
        <p>Genre :</p>
        <label for="homme">Homme</label>
        <input type="radio" id="homme" name="genre" value="homme">
        <label for="femme">Femme</label>
        <input type="radio" id="femme" name="genre" value="femme">
        <label for="autres">Autres</label>
        <input type="radio" id="autres" name="genre" value="autres">
        <br><br>

        <!-- Champ pays (texte libre) -->
        <label for="pays">Pays :</label>
        <input type="text" id="pays" name="pays" required>
        <br><br>

        <!-- Zone de texte -->
        <label for="message">Message :</label><br>
        <textarea id="message" name="message" rows="5" cols="40"></textarea>
        <br><br>

        <!-- Boutons -->
        <button type="submit" class="btn-link">Envoyer</button>
        <button type="reset" class="btn-link secondary">Réinitialiser</button>
      </form>
    </section>
  </main>
</body>
